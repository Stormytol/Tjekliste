<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Tjekliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14161c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tjekliste">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root{
    --bg: #0f1115;
    --card: #171a21;
    --card-line: #262b36;
    --text: #eef0f4;
    --text-dim: #8890a0;
    --cykel: #ff8a5c;
    --toej: #ffd66b;
    --svom: #6be3c4;
    --toilet: #c99bff;
    --traening: #ff6b8b;
    --andet: #7fb0ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh;
    padding: env(safe-area-inset-top,20px) 16px calc(env(safe-area-inset-bottom,20px) + 30px);
  }
  .wrap{max-width:480px; margin:0 auto;}

  /* boarding-pass style header card */
  .pass{
    position:relative;
    background: linear-gradient(155deg, #1b1f29, #14161d 60%);
    border:1px solid var(--card-line);
    border-radius:20px;
    padding:22px 20px 18px;
    margin: 10px 0 22px;
    overflow:hidden;
  }
  .pass::before{
    content:"";
    position:absolute; top:0; right:-40px;
    width:160px; height:160px;
    background: radial-gradient(circle at center, rgba(107,227,196,0.16), transparent 70%);
  }
  .pass-row{display:flex; justify-content:space-between; align-items:flex-start; position:relative;}
  .pass-eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color: var(--text-dim); margin-bottom:6px;
  }
  .pass-title{font-size:24px; font-weight:700; letter-spacing:-0.01em; margin:0;}
  .pass-dist{
    text-align:right;
  }
  .pass-dist .num{font-size:24px; font-weight:700; color:var(--svom); line-height:1;}
  .pass-dist .unit{font-size:11px; color:var(--text-dim); letter-spacing:0.08em;}

  .perforation{
    display:flex; align-items:center; gap:6px;
    margin:16px -20px 14px;
    padding: 0 20px;
  }
  .perforation .line{flex:1; height:1px; border-top:1px dashed var(--card-line);}
  .perforation .hole{
    width:14px; height:14px; border-radius:50%;
    background: var(--bg);
    flex-shrink:0;
  }
  .perforation .hole.left{margin-left:-27px;}
  .perforation .hole.right{margin-right:-27px;}

  .progress-row{display:flex; align-items:center; gap:10px;}
  .progress-track{
    flex:1; height:7px; background:#0d0f14; border-radius:8px; overflow:hidden;
    border:1px solid var(--card-line);
  }
  .progress-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--cykel), var(--svom));
    border-radius:8px;
    transition: width .35s ease;
  }
  .progress-num{font-size:12px; color:var(--text-dim); min-width:44px; text-align:right; font-variant-numeric: tabular-nums;}

  /* categories */
  .category{margin-bottom:18px;}
  .cat-head{
    display:flex; align-items:center; gap:10px; margin-bottom:8px; padding-left:2px;
  }
  .cat-dot{
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0;
  }
  .cat-title{font-size:14.5px; font-weight:600;}
  .cat-count{
    font-size:11px;
    color:var(--text-dim);
    margin-left:auto;
    font-variant-numeric: tabular-nums;
  }

  .items{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:16px;
    overflow:hidden;
  }
  .item{
    display:flex; align-items:center; gap:12px;
    padding:13px 14px;
    border-bottom:1px solid var(--card-line);
  }
  .item:last-child{border-bottom:none;}
  .item.checked .item-label{color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--text-dim);}

  .checkbox{
    width:22px; height:22px;
    flex-shrink:0;
    border-radius:7px;
    border:2px solid var(--card-line);
    background:transparent;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .12s, border-color .12s;
    padding:0;
  }
  .checkbox svg{opacity:0; transform:scale(.6); transition: opacity .12s, transform .12s;}
  .checkbox.on svg{opacity:1; transform:scale(1);}

  .item-label{flex:1; font-size:15px;}
  .item-remove{
    background:none; border:none; color:var(--text-dim);
    font-size:17px; cursor:pointer; padding:2px 6px; border-radius:6px;
    line-height:1;
  }
  .item-remove:active{color:var(--traening);}

  .add-row{
    display:flex; gap:8px; padding:11px 14px;
  }
  .add-row input{
    flex:1;
    background:#0d0f14;
    border:1px solid var(--card-line);
    color:var(--text);
    border-radius:10px;
    padding:9px 11px;
    font-size:15px;
    font-family:inherit;
  }
  .add-row input:focus-visible{outline:2px solid var(--svom); outline-offset:1px;}
  .add-row button{
    background:var(--card-line); color:var(--text); border:none;
    border-radius:10px; padding:0 15px; font-size:19px; cursor:pointer;
  }
  .add-row button:active{background:#343a49;}

  .reset-row{text-align:center; margin-top:8px;}
  .reset-btn{
    background:none; border:none; color:var(--text-dim);
    font-size:12px; padding:10px; cursor:pointer; text-decoration:underline;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="pass">
    <div class="pass-row">
      <div>
        <h1 class="pass-title">Tjekliste</h1>
      </div>
    </div>
    <div class="perforation">
      <div class="hole left"></div>
      <div class="line"></div>
      <div class="hole right"></div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-num" id="progressNum">0/0</div>
    </div>
  </div>

  <div id="categories"></div>

  <div class="reset-row">
    <button class="reset-btn" id="resetBtn">Nulstil alle flueben</button>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'jylland-tjekliste-v1';

  const CATS = [
    { key: 'cykel',    title: 'På cyklen (tirsdag, 44 km)', color:'#ff8a5c',
      items: ['Cykeltøj (trøje, bib/shorts)','Cykelhjelm','Cykelhandsker','Cykelsko','Regnjakke (hvis usikkert vejr)','Solbriller','Drikkedunke','Energibarer','Lappegrej (reservelapper, pumpe/CO2, multiværktøj)','Mobil','Powerbank'] },
    { key: 'toej',     title: 'Tøj', color:'#ffd66b',
      items: ['5-6 t-shirts/toppe','2-3 par shorts/bukser','Undertøj og sokker (til ugen)','Varm trøje/hoodie','Pyjamas','Vindjakke/let regntøj'] },
    { key: 'svom',     title: 'Svømning', color:'#6be3c4',
      items: ['Vådragt','Svømmebriller','Badehætte','Badetøj','Håndklæde'] },
    { key: 'toilet',   title: 'Toiletsager', color:'#c99bff',
      items: ['Tandbørste + tandpasta','Deodorant','Shampoo/sæbe','Solcreme','Fast medicin (hvis relevant)'] },
    { key: 'traening', title: 'Træning', color:'#ff6b8b',
      items: ['Træningstøj til calisthenics','Oplader til Garmin-ur'] },
    { key: 'andet',    title: 'Andet', color:'#7fb0ff',
      items: ['Telefonoplader','Bog/underholdning'] },
  ];

  function makeId(){ return Math.random().toString(36).slice(2,9); }

  function defaultState(){
    const state = {};
    CATS.forEach(cat=>{
      state[cat.key] = cat.items.map(label => ({ id: makeId(), label, checked:false }));
    });
    return state;
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){ /* ignore, fall through */ }
    return defaultState();
  }

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ /* storage full or unavailable */ }
  }

  let state = loadState();

  const catsEl = document.getElementById('categories');
  const progressFill = document.getElementById('progressFill');
  const progressNum = document.getElementById('progressNum');

  function updateProgress(){
    let total=0, done=0;
    CATS.forEach(cat=> (state[cat.key]||[]).forEach(it=>{ total++; if(it.checked) done++; }));
    progressFill.style.width = total ? (done/total*100)+'%' : '0%';
    progressNum.textContent = done + '/' + total;
  }

  function checkboxSvg(){
    return '<svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.7 9L10 3" stroke="#0d1015" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  function render(){
    catsEl.innerHTML = '';
    CATS.forEach(cat=>{
      const list = state[cat.key] || [];
      const doneCount = list.filter(i=>i.checked).length;

      const wrap = document.createElement('div');
      wrap.className = 'category';

      const head = document.createElement('div');
      head.className = 'cat-head';
      head.innerHTML = `
        <div class="cat-dot" style="background:${cat.color}"></div>
        <div class="cat-title">${cat.title}</div>
        <div class="cat-count">${doneCount}/${list.length}</div>
      `;
      wrap.appendChild(head);

      const itemsEl = document.createElement('div');
      itemsEl.className = 'items';

      list.forEach(item=>{
        const row = document.createElement('div');
        row.className = 'item' + (item.checked ? ' checked' : '');

        const cb = document.createElement('button');
        cb.className = 'checkbox' + (item.checked ? ' on' : '');
        cb.style.borderColor = item.checked ? cat.color : '';
        cb.style.background = item.checked ? cat.color : '';
        cb.innerHTML = checkboxSvg();
        cb.setAttribute('aria-label', (item.checked?'Fjern flueben: ':'Sæt flueben: ') + item.label);
        cb.onclick = ()=>{
          item.checked = !item.checked;
          saveState();
          render();
        };

        const label = document.createElement('div');
        label.className = 'item-label';
        label.textContent = item.label;

        const removeBtn = document.createElement('button');
        removeBtn.className = 'item-remove';
        removeBtn.textContent = '\u2715';
        removeBtn.setAttribute('aria-label', 'Fjern ' + item.label);
        removeBtn.onclick = ()=>{
          state[cat.key] = state[cat.key].filter(i=> i.id !== item.id);
          saveState();
          render();
        };

        row.appendChild(cb);
        row.appendChild(label);
        row.appendChild(removeBtn);
        itemsEl.appendChild(row);
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      const input = document.createElement('input');
      input.placeholder = 'Tilføj ting…';
      const addBtn = document.createElement('button');
      addBtn.textContent = '+';
      addBtn.setAttribute('aria-label', 'Tilføj til ' + cat.title);
      function addItem(){
        const v = input.value.trim();
        if(!v) return;
        state[cat.key].push({ id: makeId(), label: v, checked:false });
        input.value = '';
        saveState();
        render();
      }
      addBtn.onclick = addItem;
      input.addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
      addRow.appendChild(input);
      addRow.appendChild(addBtn);
      itemsEl.appendChild(addRow);

      wrap.appendChild(itemsEl);
      catsEl.appendChild(wrap);
    });
    updateProgress();
  }

  document.getElementById('resetBtn').onclick = ()=>{
    if(confirm('Fjern alle flueben? Dine ting bliver ikke slettet, kun afkrydsningerne nulstilles.')){
      CATS.forEach(cat=> (state[cat.key]||[]).forEach(it=> it.checked=false));
      saveState();
      render();
    }
  };

  render();
})();
</script>
</body>
</html>
